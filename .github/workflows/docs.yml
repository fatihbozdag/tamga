name: Docs

# Builds the MkDocs site on every push that touches docs/ or src/ and uploads the
# rendered HTML as a workflow artifact. The deploy-to-Pages step is intentionally
# omitted: GitHub Pages is unavailable on private repositories below the Pro tier.
# When the repo is made public (or upgraded), add a deploy job back:
#
#   deploy:
#     needs: build
#     runs-on: ubuntu-latest
#     environment:
#       name: github-pages
#       url: ${{ steps.deployment.outputs.page_url }}
#     steps:
#       - id: deployment
#         uses: actions/deploy-pages@v4
#
# and re-grant `pages: write` + `id-token: write` at the workflow level, plus swap
# `actions/upload-artifact` below for `actions/upload-pages-artifact`.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/tamga/**/*.py"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/tamga/**/*.py"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv pip install --system -e ".[docs]"
      - run: mkdocs build --strict
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
          retention-days: 14
