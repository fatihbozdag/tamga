site_name: bitig
site_description: Computational stylometry — a Python replacement for R's Stylo, with a forensic toolkit on top.
site_author: Fatih Bozdağ
site_url: https://fatihbozdag.github.io/bitig/
repo_url: https://github.com/fatihbozdag/bitig
repo_name: fatihbozdag/bitig
edit_uri: edit/main/docs/
copyright: BSD-3-Clause

docs_dir: docs/site
site_dir: site

not_in_nav: |
  _translations/*

theme:
  name: material
  logo: assets/bitig-banner.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - en
        - tr
  - autorefs:
      resolve_closest: true
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          site_name: bitig
        - locale: tr
          name: Türkçe
          build: true
          site_name: bitig
          nav_translations:
            Home: Ana Sayfa
            Getting started: Başlangıç
            Concepts: Kavramlar
            Choosing a method: Yöntem seçimi
            Corpus: Derlem
            Features: Öznitelikler
            Languages: Diller
            Methods: Yöntemler
            Results & provenance: Sonuçlar ve köken bilgisi
            Forensic toolkit: Adli Araç Seti
            Verification: Doğrulama
            Calibration & LR output: Kalibrasyon ve OO çıktısı
            Topic-invariant features: Konudan Bağımsız Öznitelikler
            Evaluation (PAN suite): Değerlendirme (PAN)
            Reporting: Raporlama
            Tutorials: Öğreticiler
            Federalist Papers: Federalist Yazıları
            PAN-CLEF verification: PAN-CLEF doğrulama
            Turkish stylometry: Türkçe stilometri
            Reference: Referans
            CLI: Komut satırı
            study.yaml schema: study.yaml şeması
            Python API: Python API
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [., docs/site]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts:
      - concepts/index.md
      - Choosing a method: concepts/choosing.md
      - Corpus: concepts/corpus.md
      - Features: concepts/features.md
      - Languages: concepts/languages.md
      - Methods: concepts/methods.md
      - Results & provenance: concepts/results.md
  - Forensic toolkit:
      - forensic/index.md
      - Verification: forensic/verification.md
      - Calibration & LR output: forensic/calibration.md
      - Topic-invariant features: forensic/topic-invariance.md
      - Evaluation (PAN suite): forensic/evaluation.md
      - Reporting: forensic/reporting.md
  - Tutorials:
      - tutorials/index.md
      - Federalist Papers: tutorials/federalist.md
      - PAN-CLEF verification: tutorials/pan-clef.md
      - Turkish stylometry: tutorials/turkish.md
  - Reference:
      - reference/index.md
      - CLI: reference/cli.md
      - study.yaml schema: reference/config.md
      - Python API: reference/api.md
