<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-labelledby="t a">
  <title id="t">tamga</title>
  <desc id="a">tamga — computational stylometry: the tamga mark beside the wordmark and tagline.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1A2B"/>
      <stop offset="1" stop-color="#13243C"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5ECD5"/>
      <stop offset="1" stop-color="#E9D7A3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A34A"/>
      <stop offset="1" stop-color="#E9D7A3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="380" fill="url(#bg)"/>

  <!-- decorative side-rule -->
  <line x1="40" y1="80" x2="40" y2="300" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

  <!-- tamga mark: a stylized clan-mark, asymmetric geometry suggesting a signature -->
  <g transform="translate(120 80)" fill="none" stroke="url(#ink)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- vertical stem -->
    <line x1="80" y1="10" x2="80" y2="210"/>
    <!-- top arc opening left (identity loop) -->
    <path d="M 80 60 Q 20 60 20 110 Q 20 160 80 160"/>
    <!-- right angled flourish (the ligature that gives the mark its character) -->
    <path d="M 80 90 L 150 60 L 180 90"/>
    <!-- foot/serif -->
    <path d="M 50 210 L 80 210 L 120 220"/>
    <!-- small tick as an ornamental dot -->
    <circle cx="150" cy="170" r="6" fill="url(#accent)" stroke="none"/>
  </g>

  <!-- wordmark -->
  <g font-family="Georgia, 'Source Serif Pro', 'Iowan Old Style', serif" fill="url(#ink)">
    <text x="380" y="200" font-size="160" font-weight="600" letter-spacing="2">tamga</text>
    <text x="382" y="245" font-size="22" letter-spacing="6" opacity="0.85" font-family="'Helvetica Neue', Arial, sans-serif">
      COMPUTATIONAL  STYLOMETRY
    </text>
  </g>

  <!-- tagline separator + tagline -->
  <line x1="382" y1="275" x2="420" y2="275" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
  <text x="435" y="281" font-family="Georgia, 'Source Serif Pro', serif" font-size="20" fill="url(#ink)" opacity="0.88" font-style="italic">
    a python replacement for R's Stylo — with a forensic toolkit on top
  </text>

  <!-- origin gloss -->
  <text x="382" y="322" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#C9A34A" opacity="0.75" letter-spacing="1">
    TAMGA  (Old Turkic)  ·  mark,  brand,  clan-sign
  </text>
</svg>
