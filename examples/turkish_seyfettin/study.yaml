# Within-author exploratory stylometry on Ömer Seyfettin's short-story corpus.
#
# Wikisource:tr currently has substantial PD-old prose for only one author, so
# this tutorial showcases what bitig produces when you point it at a single
# author's body of work: pairwise Burrows Delta, a PCA biplot of the lexical
# axes, and a Ward hierarchical clustering that surfaces sub-structure (genre
# / period / theme) inside one writer's career.
#
# Run it with:
#   .venv/bin/python -m bitig run examples/turkish_seyfettin/study.yaml --name seyfettin

name: seyfettin-within-author
seed: 42

corpus:
  path: examples/turkish_seyfettin/corpus
  metadata: examples/turkish_seyfettin/corpus/metadata.tsv

preprocess:
  language: tr
  spacy:
    backend: spacy_stanza
    device: cpu

features:
  - id: mfw500
    type: mfw
    n: 500
    min_df: 2
    scale: zscore
    lowercase: true

  - id: tr_fwords
    type: function_word
    scale: zscore

methods:
  - id: burrows
    kind: delta
    method: burrows
    features: mfw500
    group_by: author

  - id: pca
    kind: reduce
    variant: pca
    features: mfw500
    n_components: 2

  - id: ward
    kind: cluster
    variant: hierarchical
    features: mfw500
    linkage: ward
    n_clusters: 4

viz:
  format: [png]
  dpi: 200

output:
  dir: examples/turkish_seyfettin/results
  timestamp: false
